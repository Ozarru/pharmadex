{% if messages %}
  <div class="flex flex-col gap-2 mb-4" id="server-messages">
    {% for message in messages %}
      <div class="flex items-center gap-2 p-4 rounded-xl border
        {% if message.tags == 'error' %}bg-red-100 text-red-600 border-red-200
        {% elif message.tags == 'warning' %}bg-yellow-100 text-yellow-700 border-yellow-200
        {% elif message.tags == 'info' %}bg-blue-100 text-blue-600 border-blue-200
        {% elif message.tags == 'success' %}bg-green-100 text-green-600 border-green-200
        {% else %}bg-gray-400 text-white border
        {% endif %}">

        {% if message.tags == 'error' %}
          <i class="fa-solid fa-circle-exclamation"></i>
        {% elif message.tags == 'warning' %}
          <i class="fa-solid fa-triangle-exclamation"></i>
        {% elif message.tags == 'info' %}
        <i class="fa-solid fa-info-circle"></i>
        {% elif message.tags == 'success' %}
        <i class="fa-solid fa-circle-check"></i>
        {% else %}
        <i class="fa-solid fa-circle-question"></i>
        {% endif %}
        <span>{{ message|default:"" }}</span>
      </div>
    {% endfor %}
  </div>
{% endif %}
