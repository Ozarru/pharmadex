<header class="bg-lightest rounded-xl p-6 flex flex-col lg:flex-row justify-between items-start gap-6 shadow-sm">
  <!-- Left: Title + description -->
  <div class="flex flex-col gap-2">
    <div class="flex items-center gap-3">
      <span class="text-3xl text-primary">
        <i class="{{ model_icon }}"></i>
      </span>
      <h1 class="text-lg font-bold text-heading">{{ title }}</h1>
    </div>
    {% if header_paragraph %}
      <p class="text-sm text-body max-w-3xl leading-relaxed">
        {{ header_paragraph }}
      </p>
    {% endif %}
  </div>

  <!-- Right: Quick stats cards -->
  <div class="flex flex-wrap gap-4 mt-4 lg:mt-0">
    {% for stat in stats %}
      <div class="bg-white rounded-lg p-4 shadow flex flex-col items-center w-36">
        <div class="text-xl text-secondary font-semibold">{{ stat.value }}</div>
        <div class="text-xs text-label">{{ stat.label }}</div>
      </div>
    {% endfor %}
  </div>
</header>
