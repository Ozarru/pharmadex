{% load static i18n %}
<!--  -->
{% if value == True %}
<span
  class="inline-flex items-center px-3 py-1.5 text-sm font-medium bg-green-100 text-green-700 rounded-full"
>
  <i class="fa-solid fa-toggle-on mr-2"></i> {% trans "Active" %}
</span>
{% else %}
<span
  class="inline-flex items-center px-3 py-1.5 text-sm font-medium bg-red-100 text-red-600 rounded-full"
>
  <i class="fa-solid fa-toggle-off mr-2"></i> {% trans "Inactive" %}
</span>
{% endif %}
