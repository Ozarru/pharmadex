{% load static i18n %}

<!-- ================= COUNTRY PICKER ================= -->
<div class="relative flex flex-col items-center">
  <button
    onclick="toggleMenu(this, 'countryMenu')"
    aria-label="{% trans 'Select country' %}"
    class="hover-text-secondary transition text-gray-500 flex items-center gap-2"
  >
    <img 
      id="countryFlag" 
      src="https://flagcdn.com/w20/sn.png" 
      alt="" 
      class="w-5 h-3.5 rounded-sm object-cover shadow-sm"
    />
    <span id="countryCode" class="text-sm font-medium">SN</span>
    <i class="fas fa-chevron-down text-[10px] text-gray-400"></i>
  </button>
  
  <div
    id="countryMenu"
    class="hidden absolute right-0 bottom-10 bg-white border border-gray-200 rounded-2xl shadow-2xl w-64 flex flex-col text-sm z-50 overflow-hidden max-h-80"
    role="menu"
    aria-orientation="vertical"
  >
    <!-- Search -->
    <div class="p-3 border-b border-gray-100">
      <div class="relative">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
        <input 
          type="text" 
          id="countrySearch"
          placeholder="{% trans 'Search country...' %}"
          class="w-full pl-8 pr-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary/20"
          oninput="filterCountries(this.value)"
        />
      </div>
    </div>
    
    <!-- Country List -->

        data-country="Benin"
        data-code="BJ"

        <div class="flex-1">
          <span class="font-medium">{% trans "Benin" %}</span>

        </div>

<script>
    (function() {
  'use strict';

  const COUNTRY_STORAGE_KEY = 'pharmadex-country';
  const CURRENCY_STORAGE_KEY = 'pharmadex-currency';

  // ── Country Data (West Africa) ────────────────────────────
  const countryData = {
    'BJ': { name: 'Benin', currency: 'XOF', symbol: 'Fr', flag: 'bj' },
    'BF': { name: 'Burkina Faso', currency: 'XOF', symbol: 'Fr', flag: 'bf' },
    'CV': { name: 'Cabo Verde', currency: 'CVE', symbol: '$', flag: 'cv' },
    'CI': { name: "Côte d'Ivoire", currency: 'XOF', symbol: 'Fr', flag: 'ci' },
    'GM': { name: 'The Gambia', currency: 'GMD', symbol: 'D', flag: 'gm' },
    'GH': { name: 'Ghana', currency: 'GHS', symbol: '₵', flag: 'gh' },
    'GN': { name: 'Guinea', currency: 'GNF', symbol: 'Fr', flag: 'gn' },
    'GW': { name: 'Guinea-Bissau', currency: 'XOF', symbol: 'Fr', flag: 'gw' },
    'LR': { name: 'Liberia', currency: 'LRD', symbol: '$', flag: 'lr' },
    'ML': { name: 'Mali', currency: 'XOF', symbol: 'Fr', flag: 'ml' },
    'NE': { name: 'Niger', currency: 'XOF', symbol: 'Fr', flag: 'ne' },
    'NG': { name: 'Nigeria', currency: 'NGN', symbol: '₦', flag: 'ng' },
    'SN': { name: 'Senegal', currency: 'XOF', symbol: 'Fr', flag: 'sn' },
    'SL': { name: 'Sierra Leone', currency: 'SLE', symbol: 'Le', flag: 'sl' },
    'TG': { name: 'Togo', currency: 'XOF', symbol: 'Fr', flag: 'tg' }
  };

  // ── Helpers ─────────────────────────────────────────────────
  const getStoredCountry = () => localStorage.getItem(COUNTRY_STORAGE_KEY) || 'SN';
  const setStoredCountry = (code) => localStorage.setItem(COUNTRY_STORAGE_KEY, code);
  const getStoredCurrency = () => localStorage.getItem(CURRENCY_STORAGE_KEY) || 'XOF';
  const setStoredCurrency = (code) => localStorage.setItem(CURRENCY_STORAGE_KEY, code);

  // ── Apply Country ───────────────────────────────────────────
  window.setCountry = function(code, currency, symbol) {
    const data = countryData[code];
    if (!data) return;

    setStoredCountry(code);
    setStoredCurrency(currency);

    // Update UI
    const flagEl = document.getElementById('countryFlag');
    const codeEl = document.getElementById('countryCode');
    
    if (flagEl) {
      flagEl.src = `https://flagcdn.com/w20/${data.flag}.png`;
      flagEl.alt = data.name;
    }
    if (codeEl) {
      codeEl.textContent = code;
    }

    // Close menu
    const menu = document.getElementById('countryMenu');
    if (menu) menu.classList.add('hidden');

    // Dispatch event for other components
    window.dispatchEvent(new CustomEvent('countrychange', {
      detail: { 
        code, 
        currency, 
        symbol, 
        name: data.name,
        flag: data.flag 
      }
    }));

    // Optional: sync with server via AJAX
    syncWithServer(code, currency);
  };

  // ── Filter Countries ────────────────────────────────────────
  window.filterCountries = function(query) {
    const items = document.querySelectorAll('#countryList [role="menuitem"]');
    const lowerQuery = query.toLowerCase().trim();
    
    items.forEach(item => {
      const countryName = item.dataset.country.toLowerCase();
      const countryCode = item.dataset.code.toLowerCase();
      const match = countryName.includes(lowerQuery) || countryCode.includes(lowerQuery);
      item.style.display = match ? 'flex' : 'none';
    });
  };

  // ── Sync with Server ────────────────────────────────────────
  function syncWithServer(countryCode, currencyCode) {
    // Optional: send to Django backend
    fetch('/api/set-country/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken')
      },
      body: JSON.stringify({ country: countryCode, currency: currencyCode })
    }).catch(() => {}); // Silent fail
  }

  // ── Get Cookie Helper ───────────────────────────────────────
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }

  // ── Initialize ──────────────────────────────────────────────
  function initCountry() {
    const stored = getStoredCountry();
    const data = countryData[stored];
    if (data) {
      const flagEl = document.getElementById('countryFlag');
      const codeEl = document.getElementById('countryCode');
      if (flagEl) {
        flagEl.src = `https://flagcdn.com/w20/${data.flag}.png`;
        flagEl.alt = data.name;
      }
      if (codeEl) {
        codeEl.textContent = stored;
      }
    }
  }

  // Run when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initCountry);
  } else {
    initCountry();
  }

})();
</script>
