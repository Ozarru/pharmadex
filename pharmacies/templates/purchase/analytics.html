{% extends "main.html" %}
{% load i18n %}

{% block content %}
<div class="flex flex-col gap-6">

  {% include "components/_stats_header.html" %}

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div class="cardbox">
      <p class="text-sm text-body">{% trans "Total Purchases" %}</p>
      <p class="text-2xl font-bold">{{ total_purchases }}</p>
    </div>

    <div class="cardbox">
      <p class="text-sm text-body">{% trans "Total Purchase Cost" %}</p>
      <p class="text-2xl font-bold">${{ total_cost }}</p>
    </div>
  </div>

</div>
{% endblock %}
